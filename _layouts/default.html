<!DOCTYPE html>
<html lang="{{ site.lang }}">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
	<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
	<link rel="canonical" href="{{ page.url | absolute_url }}">
	<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6f9">
	<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0e15">

	<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
	<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
	<meta property="og:description"
		content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
	<meta property="og:url" content="{{ page.url | absolute_url }}">
	<meta property="og:site_name" content="{{ site.title }}">
	<meta property="og:locale" content="it_IT">
	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
	<meta name="twitter:description"
		content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
		rel="stylesheet">
	<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/icon.svg' | relative_url }}">
	<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
	<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>

<body>
	<header class="site-header">
		<div class="wrap">
			<a class="site-title" href="{{ '/' | relative_url }}">
				<svg class="dots" viewBox="0 0 44 18" aria-hidden="true">
					<circle cx="6" cy="9" r="2.6" />
					<circle cx="17" cy="9" r="2.6" />
					<circle cx="28" cy="9" r="2.6" />
					<circle cx="39" cy="9" r="2.8" class="dot-hot" />
				</svg>
				{{ site.title }}
			</a>
			<nav>
				<a href="{{ '/feed.xml' | relative_url }}">RSS</a>
			</nav>
		</div>
	</header>

	<main class="wrap">
		{{ content }}
	</main>

	<footer class="site-footer">
		<div class="wrap">
			<a class="gh" href="https://github.com/AlessandroCapelli">Alessandro Capelli - GitHub</a>
		</div>
	</footer>
</body>

</html>
