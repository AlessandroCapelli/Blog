<!DOCTYPE html>
<html lang="{{ site.lang }}">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
	<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Serif+4:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
		rel="stylesheet">
	<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/icon.svg' | relative_url }}">
	<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
	<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>

<body>
	<header class="site-header">
		<div class="wrap">
			<a class="site-title" href="{{ '/' | relative_url }}">
				<svg class="dots" viewBox="0 0 44 18" aria-hidden="true">
					<circle cx="5" cy="13" r="2.6" />
					<circle cx="18" cy="6" r="2.6" />
					<circle cx="31" cy="14" r="2.6" />
					<circle cx="40" cy="4" r="2.8" class="dot-hot" />
				</svg>
				{{ site.title }}
			</a>
			<nav>
				<a href="{{ '/feed.xml' | relative_url }}">RSS</a>
			</nav>
		</div>
	</header>

	<main class="wrap">
		{{ content }}
	</main>

	<footer class="site-footer">
		<div class="wrap">
			<a class="gh" href="https://github.com/AlessandroCapelli">Alessandro Capelli - GitHub</a>
		</div>
	</footer>
</body>

</html>
