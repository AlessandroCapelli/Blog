---
layout: default
---
<div class="progress" aria-hidden="true"></div>

<article class="post">
	<header class="post-header">
		<p class="post-meta">
			<time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d.%m.%Y" }}</time>
		</p>
		<h1>{{ page.title }}</h1>
	</header>

	<div class="post-content">
		{{ content }}
	</div>

	<nav class="post-nav">
		{% if page.previous %}
		<a class="prev" href="{{ page.previous.url | relative_url }}">
			<span class="lbl">&larr; Precedente</span>
			<span class="nt">{{ page.previous.title }}</span>
		</a>
		{% else %}<span></span>{% endif %}
		{% if page.next %}
		<a class="next" href="{{ page.next.url | relative_url }}">
			<span class="lbl">Successivo &rarr;</span>
			<span class="nt">{{ page.next.title }}</span>
		</a>
		{% endif %}
	</nav>

	<footer class="post-footer">
		<a href="{{ '/' | relative_url }}">&larr; Archivio</a>
	</footer>
</article>
